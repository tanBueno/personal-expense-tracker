<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="base.css">
    </head>
    <body>
        <div class="grid_container">
            <section class="grid_item" style='grid-area: box-1' id="current_balance">
                <h3>Current Balance:</h3>
                <h2 id="current_balance_num">0</h2>
                <img src="battle_cats_assets/Rarecapsule.webp"></img>
            </section>
            
            <section class="grid_item" style='grid-area: box-2' id="transaction_list">
                <button type="button" class="add_transaction" onclick="prepareForm('add'); displayElement('add_transaction_popup')">Add Transaction</button>
                <h4>Transaction List:</h4>
                <div id="transaction_list_container">
                    <table>
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Category</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="transaction_list_tbody">
                            <tr>
                                <th>Bruh</th>
                                <th>Bruh</th>
                                <th>Bruh</th>
                                <th>Bruh</th>
                            </tr>
                            <tr>
                                <th>Bruh</th>
                                <th>Bruh</th>
                                <th>Bruh</th>
                                <th>Bruh</th>
                            </tr>
                            <tr>
                                <th>Bruh</th>
                                <th>Bruh</th>
                                <th>Bruh</th>
                                <th>Bruh</th>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <!-- Add Transaction Pop-up -->
            <div class="form_popup" id="add_transaction_popup">
                <form class="form_container" id="add_transaction_form">
                    <h1>Add Transaction</h1>
                    <p>Transaction Type</p>
                    <label for="income">Income</label>
                    <input type="radio" id="income" name="trans_type" value="income" required>
                    <label for="expense">Expense</label>
                    <input type="radio" id="expense" name="trans_type" value="expense" required>
                    <br>
                    <label for="trans_amount">Amount</label>
                    <input type="number" name="trans_amount" min="0" required>
                    <br>
                    <label for="trans_category">Category</label>
                    <select name="trans_category" required>
                        <option value="food">Food</option>
                        <option value="transportation">Transportation</option>
                        <option value="salary">Salary</option>
                        <option value="utilities">Utilities</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="others">Others</option>
                    </select>
                    <br>
                    <label for="trans_date" required>Date of Transaction</label>
                    <input type="date" name="trans_date">
                    <br>
                    <button type="submit" class="submit-btn">Add</button>
                    <button type="button" class="cancel-btn" onclick="hideElement('add_transaction_popup')">Cancel</button>
                </form>
            </div>

            <!--Delete Dialog Popup-->
            <div class="dialog_popup" id="delete_transaction_popup">
                <div class="dialog_container">
                    <h3>Delete Transaction</h3>
                    <p>Are you sure you want to delete this transaction?</p>
                    <button class="submit-btn" onclick="deleteTransaction()">Delete</button>
                    <button class="cancel-btn" onclick="hideElement('delete_transaction_popup')">Cancel</button>
                </div>
            </div>
        </div>

        <script src="buttonfunc.js"></script>
    </body>
</html>
